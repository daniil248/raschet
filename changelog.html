<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Raschet — История изменений</title>
  <link rel="stylesheet" href="shared/app-header.css">
  <script src="firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="shared/auth.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #222; background: #f4f5f7;
      -webkit-font-smoothing: antialiased;
    }
    body { display: flex; flex-direction: column; min-height: 100vh; }
    main { flex: 1; padding: 24px 24px 80px; }
    .container { max-width: 1100px; margin: 0 auto; background: #fff; border: 1px solid #e0e3ea; border-radius: 16px; padding: 32px 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
    h1 { font-size: 24px; color: #1976d2; margin: 4px 0 16px; font-weight: 600; }
    .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
    .toolbar input[type=search] { flex: 1; min-width: 240px; padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
    .toolbar a { font-size: 12px; padding: 5px 12px; border: 1px solid #1976d2; border-radius: 6px; color: #1976d2; text-decoration: none; }
    .toolbar a:hover { background: #e3f2fd; }
    .entry { margin-bottom: 14px; padding: 14px 18px; background: #fafbfc; border: 1px solid #e1e4e8; border-radius: 8px; transition: box-shadow .15s; }
    .entry:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .entry-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
    .ver-chip { display: inline-block; padding: 3px 10px; background: #1976d2; color: #fff; border-radius: 4px; font-family: ui-monospace, Consolas, monospace; font-size: 12px; font-weight: 600; }
    .entry-title { font-size: 13px; color: #333; font-weight: 500; }
    .entry-body { font-size: 13px; color: #333; line-height: 1.55; }
    .entry-body code { background: #eef1f4; padding: 1px 4px; border-radius: 3px; font-size: 90%; }
    .entry-body ul { margin: 4px 0 4px 20px; }
    a { color: #1976d2; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .loading { color: #888; padding: 20px; text-align: center; }
    .count { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div id="rs-header-mount"></div>
  <script type="module">
    import { mountHeader } from './shared/app-header.js';
    mountHeader({ title: 'История изменений', showHome: true, home: 'hub.html' });
    if (window.Auth && typeof window.Auth.init === 'function') {
      window.Auth.init().catch(e => console.warn('[changelog] auth init failed', e));
    }
  </script>
  <main>
    <div class="container">
      <h1>📜 История изменений</h1>
      <div class="toolbar">
        <input type="search" id="cl-search" placeholder="Фильтр по версии или тексту…">
        <span class="count" id="cl-count"></span>
        <a href="https://github.com/daniil248/raschet/commits/main" target="_blank" rel="noopener">Коммиты на GitHub ↗</a>
        <a href="roadmap.html">Roadmap →</a>
      </div>
      <div id="mount" class="loading">Загрузка…</div>
    </div>
  </main>
  <script type="module">
    import { inlineMd } from './shared/md-render.js';
    let ALL = [];

    function parseEntries(md) {
      const entries = [];
      // записи вида: - **<заголовок с v0.57.14>** — тело…
      // до следующей "- **" или заголовка "##" / конца
      const re = /^-\s+\*\*([^*]+)\*\*\s*—\s*([\s\S]+?)(?=^-\s+\*\*|^##|\Z)/gm;
      let m;
      while ((m = re.exec(md))) {
        const header = m[1].trim();
        const body = m[2].trim();
        const verMatch = header.match(/v(\d+\.\d+\.\d+)/);
        if (!verMatch) continue;
        entries.push({ version: verMatch[1], header, body });
      }
      entries.sort((a, b) => {
        const pa = a.version.split('.').map(Number);
        const pb = b.version.split('.').map(Number);
        for (let i = 0; i < 3; i++) if (pa[i] !== pb[i]) return pb[i] - pa[i];
        return 0;
      });
      // дедуп
      const seen = new Set();
      return entries.filter(e => { if (seen.has(e.version)) return false; seen.add(e.version); return true; });
    }

    function render(list) {
      const mount = document.getElementById('mount');
      mount.classList.remove('loading');
      if (!list.length) { mount.innerHTML = '<div style="color:#888;padding:20px;text-align:center">Ничего не найдено</div>'; return; }
      const esc = (s) => String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
      const html = list.map(e => {
        const title = e.header.replace(/v\d+\.\d+\.\d+/, '').replace(/[()]/g, '').trim();
        // тело — поддерживаем простые списки
        const body = renderBody(e.body);
        return `<div class="entry">
          <div class="entry-head">
            <span class="ver-chip">v${esc(e.version)}</span>
            <span class="entry-title">${esc(title)}</span>
          </div>
          <div class="entry-body">${body}</div>
        </div>`;
      }).join('');
      mount.innerHTML = html;
      document.getElementById('cl-count').textContent = `${list.length} записей`;
    }

    function renderBody(md) {
      // Простой рендер: переводы строк, списки, inline
      const lines = md.split('\n').map(l => l.replace(/^\s{2}/, ''));
      const out = [];
      let inList = false;
      const flushList = () => { if (inList) { out.push('</ul>'); inList = false; } };
      for (const ln of lines) {
        const li = ln.match(/^\s*[-*]\s+(.+)$/);
        if (li) {
          if (!inList) { out.push('<ul>'); inList = true; }
          out.push(`<li>${inlineMd(li[1])}</li>`);
        } else if (ln.trim() === '') {
          flushList();
        } else {
          flushList();
          out.push(`<div>${inlineMd(ln)}</div>`);
        }
      }
      flushList();
      return out.join('');
    }

    async function load() {
      try {
        const resp = await fetch('./PLAN_ROADMAP.md', { cache: 'no-store' });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const md = await resp.text();
        ALL = parseEntries(md);
        render(ALL);
        const srch = document.getElementById('cl-search');
        srch.addEventListener('input', () => {
          const q = srch.value.toLowerCase();
          if (!q) { render(ALL); return; }
          render(ALL.filter(e =>
            e.version.includes(q)
            || e.header.toLowerCase().includes(q)
            || e.body.toLowerCase().includes(q)
          ));
        });
      } catch (e) {
        document.getElementById('mount').innerHTML = '<div style="color:#c62828">Ошибка загрузки: ' + e.message + '</div>';
      }
    }
    load();
  </script>
</body>
</html>
