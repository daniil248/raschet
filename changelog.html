<head>
  <meta charset="utf-8">

  <title>Raschet ‚Äî –ò—Å—Ç–æ—Ä–∏—è –∏–∑–º–µ–Ω–µ–Ω–∏–π</title>
  <link rel="stylesheet" href="shared/app-header.css">
  <script src="firebase-config.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #222; background: #f4f5f7;
      -webkit-font-smoothing: antialiased;
    }
    body { display: flex; flex-direction: column; min-height: 100vh; }
    main { flex: 1; padding: 24px 24px 80px; }
    .container { max-width: 1100px; margin: 0 auto; background: #fff; border: 1px solid #e0e3ea; border-radius: 16px; padding: 32px 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
    h1 { font-size: 24px; color: #1976d2; margin: 4px 0 16px; font-weight: 600; }
    .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
    .toolbar input[type=search] { flex: 1; min-width: 240px; padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
    .toolbar a { font-size: 12px; padding: 5px 12px; border: 1px solid #1976d2; border-radius: 6px; color: #1976d2; text-decoration: none; }
    .toolbar a:hover { background: #e3f2fd; }
    .entry { margin-bottom: 14px; padding: 14px 18px; background: #fafbfc; border: 1px solid #e1e4e8; border-radius: 8px; transition: box-shadow .15s; }
    .entry:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .entry-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
    .ver-chip { display: inline-block; padding: 3px 10px; background: #1976d2; color: #fff; border-radius: 4px; font-family: ui-monospace, Consolas, monospace; font-size: 12px; font-weight: 600; }
    .entry-title { font-size: 13px; color: #333; font-weight: 500; }
    .entry-body { font-size: 13px; color: #333; line-height: 1.55; }
    .entry-body code { background: #eef1f4; padding: 1px 4px; border-radius: 3px; font-size: 90%; }
    .entry-body ul { margin: 4px 0 4px 20px; }
    a { color: #1976d2; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .loading { color: #888; padding: 20px; text-align: center; }
    .count { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div id="rs-header-mount"></div>
  <script type="module">
    import { mountHeader } from './shared/app-header.js';
    mountHeader({ title: '–ò—Å—Ç–æ—Ä–∏—è –∏–∑–º–µ–Ω–µ–Ω–∏–π', showHome: true, home: 'hub.html' });
    if (window.Auth && typeof window.Auth.init === 'function') {
      window.Auth.init().catch(e => console.warn('[changelog] auth init failed', e));
    }
  </script>
  <main>
    <div class="container">
      <h1>üìú –ò—Å—Ç–æ—Ä–∏—è –∏–∑–º–µ–Ω–µ–Ω–∏–π</h1>
      <div class="toolbar">
        <input type="search" id="cl-search" placeholder="–§–∏–ª—å—Ç—Ä –ø–æ –≤–µ—Ä—Å–∏–∏ –∏–ª–∏ —Ç–µ–∫—Å—Ç—É‚Ä¶">
        <span class="count" id="cl-count"></span>
        <a href="https://github.com/daniil248/raschet/commits/main" target="_blank" rel="noopener">–ö–æ–º–º–∏—Ç—ã –Ω–∞ GitHub ‚Üó</a>
        <a href="roadmap.html">Roadmap ‚Üí</a>
      </div>
      <div id="mount" class="loading">–ó–∞–≥—Ä—É–∑–∫–∞‚Ä¶</div>
    </div>
  </main>
  <script type="module">
    import { inlineMd } from './shared/md-render.js';
    let ALL = [];

    // v0.57.62: –∏—Å—Ç–æ—á–Ω–∏–∫ –∏—Å—Ç–æ—Ä–∏–∏ ‚Äî git-–∫–æ–º–º–∏—Ç—ã —á–µ—Ä–µ–∑ GitHub API. –Ý–∞–Ω—å—à–µ
    // –ø–∞—Ä—Å–∏–ª–∏ ROADMAP.md, –Ω–æ –æ—Ç—Ç—É–¥–∞ changelog –±—ã–ª —É–±—Ä–∞–Ω –ø–æ –∑–∞–ø—Ä–æ—Å—É
    // –ø–æ–ª—å–∑–æ–≤–∞—Ç–µ–ª—è, –∏ —Å—Ç—Ä–∞–Ω–∏—Ü–∞ —Å—Ç–∞–ª–∞ –ø—É—Å—Ç–æ–π. –¢–µ–ø–µ—Ä—å —á–∏—Ç–∞–µ–º –Ω–∞–ø—Ä—è–º—É—é
    // –∫–æ–º–º–∏—Ç—ã —Ñ–æ—Ä–º–∞—Ç–∞ "vX.Y.Z ‚Äî <title>\n\n<body>" –∏–∑ —Ä–µ–ø–æ daniil248/raschet.
    const REPO = 'daniil248/raschet';

    function parseCommit(commit) {
      const msg = commit.commit?.message || '';
      const firstLine = msg.split('\n', 1)[0];
      // –ò—â–µ–º –≤ –ø–µ—Ä–≤–æ–π —Å—Ç—Ä–æ–∫–µ "vX.Y.Z"
      const m = firstLine.match(/v(\d+\.\d+\.\d+)\s*[‚Äî\-:]?\s*(.*)$/);
      if (!m) return null;
      const version = m[1];
      const titleTail = (m[2] || '').trim();
      // –¢–µ–ª–æ –∫–æ–º–º–∏—Ç–∞: –≤—Å—ë –ø–æ—Å–ª–µ –ø–µ—Ä–≤–æ–π –ø—É—Å—Ç–æ–π —Å—Ç—Ä–æ–∫–∏
      const nl = msg.indexOf('\n\n');
      let body = nl > 0 ? msg.slice(nl + 2).trim() : '';
      // –û–±—Ä–µ–∑–∞–µ–º Co-Authored-By / —Å–ª—É–∂–µ–±–Ω—ã–µ —Å—Ç—Ä–æ–∫–∏
      body = body
        .split('\n')
        .filter(l => !/^Co-Authored-By:/i.test(l) && !/^Signed-off-by:/i.test(l))
        .join('\n')
        .trim();
      return {
        version,
        header: `v${version} ‚Äî ${titleTail}`,
        body,
        sha: commit.sha,
        url: commit.html_url,
        author: commit.commit?.author?.name || '',
        date: commit.commit?.author?.date || '',
      };
    }

    async function fetchCommits() {
      // –î–æ 300 –ø–æ—Å–ª–µ–¥–Ω–∏—Ö –∫–æ–º–º–∏—Ç–æ–≤ (3 —Å—Ç—Ä–∞–Ω–∏—Ü—ã √ó 100).
      const all = [];
      for (let p = 1; p <= 3; p++) {
        const r = await fetch(`https://api.github.com/repos/${REPO}/commits?per_page=100&page=${p}`, {
          headers: { Accept: 'application/vnd.github+json' },
        });
        if (!r.ok) break;
        const batch = await r.json();
        if (!Array.isArray(batch) || !batch.length) break;
        all.push(...batch);
        if (batch.length < 100) break;
      }
      return all;
    }

    function buildEntries(commits) {
      const out = [];
      const seen = new Set();
      for (const c of commits) {
        const e = parseCommit(c);
        if (!e) continue;
        if (seen.has(e.version)) continue;
        seen.add(e.version);
        out.push(e);
      }
      out.sort((a, b) => {
        const pa = a.version.split('.').map(Number);
        const pb = b.version.split('.').map(Number);
        for (let i = 0; i < 3; i++) if (pa[i] !== pb[i]) return pb[i] - pa[i];
        return 0;
      });
      return out;
    }

    function render(list) {
      const mount = document.getElementById('mount');
      mount.classList.remove('loading');
      if (!list.length) { mount.innerHTML = '<div style="color:#888;padding:20px;text-align:center">–ù–∏—á–µ–≥–æ –Ω–µ –Ω–∞–π–¥–µ–Ω–æ</div>'; return; }
      const esc = (s) => String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
      const html = list.map(e => {
        const title = e.header.replace(/v\d+\.\d+\.\d+/, '').replace(/[‚Äî\-:]\s*/, '').replace(/[()]/g, '').trim();
        // —Ç–µ–ª–æ ‚Äî –ø–æ–¥–¥–µ—Ä–∂–∏–≤–∞–µ–º –ø—Ä–æ—Å—Ç—ã–µ —Å–ø–∏—Å–∫–∏
        const body = renderBody(e.body);
        const date = e.date ? new Date(e.date).toLocaleDateString('ru-RU') : '';
        const shaLink = e.sha ? `<a href="${esc(e.url)}" target="_blank" rel="noopener" style="font-family:ui-monospace,Consolas,monospace;font-size:11px;color:#888">${esc(e.sha.slice(0,7))}</a>` : '';
        return `<div class="entry">
          <div class="entry-head">
            <span class="ver-chip">v${esc(e.version)}</span>
            <span class="entry-title">${esc(title)}</span>
            ${date ? `<span class="count">${esc(date)}</span>` : ''}
            ${shaLink}
          </div>
          <div class="entry-body">${body}</div>
        </div>`;
      }).join('');
      mount.innerHTML = html;
      document.getElementById('cl-count').textContent = `${list.length} –∑–∞–ø–∏—Å–µ–π`;
    }

    function renderBody(md) {
      // –ü—Ä–æ—Å—Ç–æ–π —Ä–µ–Ω–¥–µ—Ä: –ø–µ—Ä–µ–≤–æ–¥—ã —Å—Ç—Ä–æ–∫, —Å–ø–∏—Å–∫–∏, inline
      const lines = md.split('\n').map(l => l.replace(/^\s{2}/, ''));
      const out = [];
      let inList = false;
      const flushList = () => { if (inList) { out.push('</ul>'); inList = false; } };
      for (const ln of lines) {
        const li = ln.match(/^\s*[-*]\s+(.+)$/);
        if (li) {
          if (!inList) { out.push('<ul>'); inList = true; }
          out.push(`<li>${inlineMd(li[1])}</li>`);
        } else if (ln.trim() === '') {
          flushList();
        } else {
          flushList();
          out.push(`<div>${inlineMd(ln)}</div>`);
        }
      }
      flushList();
      return out.join('');
    }

    async function load() {
      try {
        const commits = await fetchCommits();
        ALL = buildEntries(commits);
        render(ALL);
        const srch = document.getElementById('cl-search');
        srch.addEventListener('input', () => {
          const q = srch.value.toLowerCase();
          if (!q) { render(ALL); return; }
          render(ALL.filter(e =>
            e.version.includes(q)
            || e.header.toLowerCase().includes(q)
            || e.body.toLowerCase().includes(q)
          ));
        });
      } catch (e) {
        document.getElementById('mount').innerHTML = '<div style="color:#c62828">–û—à–∏–±–∫–∞ –∑–∞–≥—Ä—É–∑–∫–∏: ' + e.message + '. –ü—Ä–æ–≤–µ—Ä—å—Ç–µ —Å–æ–µ–¥–∏–Ω–µ–Ω–∏–µ —Å GitHub API.</div>';
      }
    }
    load();

    // v0.58.8: –∫–Ω–æ–ø–∫–∞ ¬´–Ω–∞–≤–µ—Ä—Ö¬ª –≤ –ø—Ä–∞–≤–æ–º –Ω–∏–∂–Ω–µ–º —É–≥–ª—É –ø—Ä–∏ —Å–∫—Ä–æ–ª–ª–µ
    (function() {
      const btn = document.createElement('button');
      btn.id = 'scroll-top-btn';
      btn.type = 'button';
      btn.title = '–ù–∞–≤–µ—Ä—Ö';
      btn.textContent = '‚Üë';
      Object.assign(btn.style, {
        position: 'fixed', right: '24px', bottom: '24px',
        width: '44px', height: '44px', borderRadius: '50%',
        border: 'none', background: '#2c3e50', color: '#fff',
        fontSize: '20px', fontWeight: '700', cursor: 'pointer',
        boxShadow: '0 4px 12px rgba(0,0,0,.2)',
        opacity: '0', pointerEvents: 'none',
        transition: 'opacity .2s ease',
        zIndex: '9999',
      });
      document.body.appendChild(btn);
      const toggle = () => {
        const show = (window.scrollY || document.documentElement.scrollTop) > 300;
        btn.style.opacity = show ? '0.9' : '0';
        btn.style.pointerEvents = show ? 'auto' : 'none';
      };
      window.addEventListener('scroll', toggle, { passive: true });
      btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
      toggle();
    })();
  </script>
  <script type="module">
    // v0.60.341: standard module-footer.
    import { mountFooter as mountModuleFooter } from './shared/module-footer.js';
    import { APP_VERSION } from './js/engine/constants.js';
    import { CHANGELOGS } from './shared/module-changelogs.js';
    mountModuleFooter({ appVersion: APP_VERSION, moduleId: 'changelog', moduleTitle: '–ñ—É—Ä–Ω–∞–ª –∏–∑–º–µ–Ω–µ–Ω–∏–π', entries: CHANGELOGS['engine'] || [] });
  </script>
</body>
</html>
