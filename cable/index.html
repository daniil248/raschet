<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Расчёт кабельной линии — Raschet</title>
  <link rel="stylesheet" href="cable-calc.css">
</head>
<body>
  <header>
    <a class="btn-back" href="../hub.html" title="К главной">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
    </a>
    <span class="hdr-title">Расчёт кабельной линии</span>
    <span class="hdr-sub" id="method-label">IEC 60364-5-52</span>
  </header>

  <main>
    <div class="panel-input">

      <div class="section-title">Методика расчёта</div>
      <div class="field">
        <select id="in-method-standard"></select>
      </div>

      <div class="section-title">Нагрузка</div>
      <div class="input-mode" id="input-mode">
        <label class="active" data-mode="current"><input type="radio" name="mode" value="current" checked><span>Ток (А)</span></label>
        <label data-mode="power"><input type="radio" name="mode" value="power"><span>Мощность (кВт)</span></label>
      </div>

      <div id="fields-current">
        <div class="field">
          <label>Расчётный ток, А</label>
          <input type="number" id="in-current" min="0" step="0.1" value="100">
        </div>
      </div>

      <div id="fields-power" style="display:none">
        <div class="field">
          <label>Мощность, кВт</label>
          <input type="number" id="in-power" min="0" step="0.1" value="30">
        </div>
      </div>

      <div class="field">
        <label>Уровень напряжения</label>
        <select id="in-voltage-level"></select>
      </div>
      <div class="field">
        <label>cos &phi;</label>
        <input type="number" id="in-cosphi" min="0.1" max="1" step="0.01" value="0.92">
      </div>

      <div class="section-title">Кабель</div>
      <div class="field-row">
        <div class="field">
          <label>Материал жил</label>
          <select id="in-material"></select>
        </div>
        <div class="field">
          <label>Изоляция</label>
          <select id="in-insulation"></select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Тип конструкции</label>
          <select id="in-cableType"></select>
        </div>
        <div class="field">
          <label>Макс. сечение, мм&sup2;</label>
          <select id="in-maxSize">
            <option value="10">10</option><option value="16">16</option>
            <option value="25">25</option><option value="35">35</option>
            <option value="50">50</option><option value="70">70</option>
            <option value="95">95</option><option value="120">120</option>
            <option value="150">150</option><option value="185">185</option>
            <option value="240" selected>240</option><option value="300">300</option>
          </select>
        </div>
      </div>

      <div class="section-title">Прокладка</div>
      <div class="field">
        <label>Способ прокладки</label>
        <select id="in-method"></select>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Температура среды, &deg;C</label>
          <input type="number" id="in-ambient" min="10" max="70" step="5" value="30">
        </div>
        <div class="field">
          <label>Кабелей в группе</label>
          <input type="number" id="in-grouping" min="1" max="20" step="1" value="1">
        </div>
      </div>
      <div class="field" id="bundling-field">
        <label>Укладка в группе</label>
        <select id="in-bundling"></select>
      </div>

      <div class="section-title">Линия</div>
      <div class="field-row">
        <div class="field">
          <label>Длина линии, м</label>
          <input type="number" id="in-length" min="0" step="1" value="30">
        </div>
        <div class="field">
          <label>Макс. падение, %</label>
          <input type="number" id="in-max-vdrop" min="0.5" max="15" step="0.5" value="5">
        </div>
      </div>

      <div class="section-title">Защита</div>
      <div class="field">
        <label>Защита параллельных линий</label>
        <select id="in-parallel-protection">
          <option value="individual">Индивидуальная (каждый кабель)</option>
          <option value="common">Общая (на группу)</option>
        </select>
      </div>

      <div class="section-title">Экономическая плотность тока</div>
      <div class="field">
        <label><input type="checkbox" id="in-eco-enabled"> Учитывать экономическую плотность</label>
      </div>
      <div id="eco-fields" style="display:none">
        <div class="field">
          <label>Методика</label>
          <select id="in-eco-method"></select>
        </div>
        <div id="eco-params"></div>
      </div>

      <button class="btn-calc" id="btn-calc">Рассчитать</button>
    </div>

    <div class="panel-result" id="result-area">
      <div class="result-empty">
        Задайте параметры и нажмите <strong>Рассчитать</strong>
      </div>
    </div>
  </main>

  <script type="module" src="cable-calc.js"></script>
</body>
</html>
