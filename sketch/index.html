<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Raschet · Скетч / Whiteboard (drawio)</title>
  <link rel="stylesheet" href="../shared/styles/base.css">
  <link rel="stylesheet" href="../shared/app-header.css">
  <link rel="stylesheet" href="sketch.css">
  <!-- Firebase Auth -->
  <script src="../firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="../shared/auth.js"></script>
  <script src="../shared/auth-gate.js" defer></script>
  <style>
    /* v0.60.166: drawio-embed integration. Полный full-screen iframe
       официального drawio (https://github.com/jgraph/drawio) через
       embed.diagrams.net. */
    body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
    .sk-drawio-host {
      flex: 1;
      position: relative;
      background: #f8fafc;
      overflow: hidden;
    }
    .sk-drawio-iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    .sk-drawio-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 6px 12px;
      background: #f9fafb;
      border-bottom: 1px solid #e2e8f0;
      font-size: 12.5px;
    }
    .sk-drawio-toolbar button,
    .sk-drawio-toolbar select {
      padding: 4px 10px;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #1f2937;
      border-radius: 4px;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
    }
    .sk-drawio-toolbar button:hover { background: #f1f5f9; }
    .sk-drawio-toolbar .sk-drawio-status {
      margin-left: auto;
      color: #64748b;
      font-size: 11.5px;
      font-style: italic;
    }
    .sk-drawio-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(248,250,252,0.95);
      z-index: 10;
      flex-direction: column;
      gap: 12px;
      color: #475569;
      font-size: 13px;
    }
    .sk-drawio-loading.hidden { display: none; }
    .sk-spinner {
      width: 32px; height: 32px;
      border: 3px solid #e2e8f0;
      border-top-color: #1e40af;
      border-radius: 50%;
      animation: sk-spin 0.8s linear infinite;
    }
    @keyframes sk-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="rs-header-mount"></div>
  <script type="module">
    import { mountHeader } from '../shared/app-header.js';
    mountHeader({ title: 'Скетч (drawio)', home: '../hub.html' });
  </script>

  <div class="sk-drawio-toolbar">
    <button type="button" id="sk-save-btn" title="Сохранить текущий sketch в проект (Ctrl+S)">💾 Сохранить</button>
    <button type="button" id="sk-export-svg" title="Экспортировать в SVG">📤 SVG</button>
    <button type="button" id="sk-export-png" title="Экспортировать в PNG">📤 PNG</button>
    <button type="button" id="sk-export-xml" title="Экспортировать XML (drawio формат)">📤 XML</button>
    <button type="button" id="sk-import-xml" title="Импортировать XML из файла">📥 XML</button>
    <input type="file" id="sk-import-file" accept=".xml,.drawio,.svg" hidden>
    <span style="border-left:1px solid #cbd5e1;height:18px"></span>
    <select id="sk-sketch-sel" title="Выбрать существующий sketch проекта"></select>
    <button type="button" id="sk-new-sketch" title="Создать новый sketch">＋ Новый</button>
    <button type="button" id="sk-rename-sketch" title="Переименовать текущий sketch">✏ Переименовать</button>
    <button type="button" id="sk-delete-sketch" title="Удалить текущий sketch">🗑 Удалить</button>
    <span class="sk-drawio-status" id="sk-status-text">Загрузка drawio…</span>
  </div>

  <div class="sk-drawio-host">
    <div class="sk-drawio-loading" id="sk-drawio-loading">
      <div class="sk-spinner"></div>
      <div>Загрузка официального drawio (jgraph/drawio)…</div>
      <div style="font-size:11px;color:#94a3b8">embed.diagrams.net • postMessage protocol</div>
    </div>
    <!-- Drawio iframe. v0.60.166 (по репорту Пользователя 2026-05-04
         «давай drawio просто заберем с гитхаба и интегрируем» +
         «обновлять так же будем с гитхаба»):
         Используем self-hosted drawio из локальной папки drawio-app/,
         если она существует. Если нет — fallback на embed.diagrams.net
         (тоже официальный drawio от jgraph, автообновляемый).
         Update workflow: см. sketch/UPDATE-DRAWIO.md — bash-скрипт
         выкачивает свежий webapp из github тегированного релиза
         jgraph/drawio. Версия фиксируется в drawio-app/VERSION. -->
    <iframe id="sk-drawio-iframe"
            class="sk-drawio-iframe"
            src="about:blank"
            allow="clipboard-read; clipboard-write"
            title="drawio editor (https://github.com/jgraph/drawio)"></iframe>
  </div>

  <div id="rs-footer-mount"></div>
  <script type="module">
    import { mountFooter } from '../shared/module-footer.js';
    import { APP_VERSION } from '../js/engine/constants.js';
    import { CHANGELOGS } from '../shared/module-changelogs.js';
    mountFooter({
      appVersion: APP_VERSION,
      moduleId: 'sketch',
      moduleTitle: 'Скетч (drawio)',
      entries: CHANGELOGS['sketch'] || [],
    });
  </script>
  <script type="module" src="sketch.js"></script>
</body>
</html>
