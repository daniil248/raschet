<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Raschet · Компоновщик шкафа</title>
  <!-- v0.59.522: страница «Шкафы проекта» (реестр) удалена — её
       функциональность полностью покрывает sidebar Компоновщика
       (rack.html). URL /scs-config/ безусловно редиректит на rack.html,
       сохраняя совместимость со всеми внешними ссылками
       (projects/project.js, scs-design, hub, закладки пользователя).
       Параметр ?list=1 (если был у пользователя) — игнорируется. -->
  <script>
    (function() {
      var qs = location.search || '';
      // очищаем list=1 если был, чтобы не зацикливать редирект если где-то остался
      qs = qs.replace(/[?&]list=1\b/, '').replace(/^&/, '?').replace(/^$/, '');
      location.replace('./rack.html' + qs);
    })();
  </script>
</head>
<body>
  <noscript>
    <p>JavaScript отключён. Перейдите вручную: <a href="./rack.html">Компоновщик шкафа</a>.</p>
  </noscript>
</body>
</html>
