<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Raschet · Шаблоны отчётов</title>
  <link rel="stylesheet" href="../shared/styles/base.css">
  <link rel="stylesheet" href="../shared/app-header.css">
  <link rel="stylesheet" href="../shared/report/editor.css">
  <link rel="stylesheet" href="reports.css">
  <!-- Firebase Auth (опционально). shared/auth.js работает и в локальном режиме. -->
  <script src="../firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="../shared/auth.js"></script>
</head>
<body>
  <div id="rs-header-mount"></div>
  <script type="module">
    import { mountHeader } from '../shared/app-header.js';
    import { mountHelp } from '../shared/help-panel.js';
    mountHeader({ title: 'Шаблоны отчётов', home: '../hub.html' });
    mountHelp({
      module: 'reports',
      title: 'Шаблоны отчётов (PDF / DOCX / HTML)',
      usage: `
        <h4>Назначение модуля</h4>
        <p>Конструктор шаблонов выходных документов: технические задания, паспорта оборудования, расчётные записки, спецификации. Один шаблон → три формата вывода (PDF, DOCX, HTML).</p>
        <h4>Порядок работы</h4>
        <ol>
          <li><b>Новый шаблон</b> — кнопка «+ Новый» слева. Укажите имя и базовые параметры.</li>
          <li><b>Редактировать оформление</b> — открывает редактор блоков.</li>
          <li><b>Сборка блоков</b> — последовательно добавляйте заголовки, таблицы, параграфы, списки.</li>
          <li><b>Предпросмотр</b> — правая панель показывает результат с live-данными текущего проекта.</li>
          <li><b>Экспорт</b> — кнопки PDF / DOCX; JSON-экспорт для переноса шаблона между проектами.</li>
          <li><b>Клонирование</b> — быстрая копия существующего шаблона для модификации.</li>
        </ol>
        <h4>Доступные блоки</h4>
        <ul>
          <li><code>B.h1</code>, <code>B.h2</code>, <code>B.h3</code> — заголовки уровней.</li>
          <li><code>B.paragraph</code> — обычный абзац с подстановками переменных.</li>
          <li><code>B.list</code> — маркированный / нумерованный список.</li>
          <li><code>B.table</code> — таблица с колонками и строками (из данных проекта).</li>
          <li><code>B.image</code> — изображение (логотип, диаграмма).</li>
          <li><code>B.spacer</code> / <code>B.pageBreak</code> — вертикальный отступ / разрыв страницы.</li>
        </ul>
        <h4>Поиск и управление</h4>
        <ul>
          <li>Поиск по имени / описанию / тегу в верхней части списка.</li>
          <li>Импорт / экспорт JSON — для обмена шаблонами между пользователями.</li>
          <li>Удаление (danger-кнопка) — с подтверждением.</li>
        </ul>
        <div class="note">Шаблоны привязаны к пользователю через Firebase Auth (если настроен), иначе хранятся в localStorage.</div>
      `,
      calcs: `
        <h4>Block API</h4>
        <p>Определён в <code>shared/report/blocks.js</code>. Каждый блок — объект с типом, опциями и содержимым:</p>
        <ul>
          <li><code>{ type: 'h1', text: 'Расчётная записка' }</code></li>
          <li><code>{ type: 'paragraph', text: 'Настоящий документ...', style: 'justify' }</code></li>
          <li><code>{ type: 'table', columns: [...], rows: [...], widths: [...] }</code></li>
          <li><code>{ type: 'list', ordered: true, items: [...] }</code></li>
        </ul>
        <h4>Meta-блоки</h4>
        <ul>
          <li><code>projectMeta</code> — автоподстановка названия проекта, заказчика, объекта.</li>
          <li><code>projectStage</code> — стадия проектирования (П / РД / Р).</li>
          <li><code>header</code> / <code>footer</code> — колонтитулы с пагинацией «стр. N из M».</li>
        </ul>
        <h4>Рендереры</h4>
        <table>
          <tr><th>Формат</th><th>Библиотека</th><th>Особенности</th></tr>
          <tr><td>PDF</td><td><code>pdfmake</code></td><td>Векторный, поддержка TTF-шрифтов, хедер/футер</td></tr>
          <tr><td>DOCX</td><td><code>docx-js</code></td><td>Открывается в Word / LibreOffice, редактируется</td></tr>
          <tr><td>HTML</td><td>собственный</td><td>Предпросмотр + печать браузером</td></tr>
        </table>
        <h4>Подстановка переменных</h4>
        <p>В текстах блоков поддерживаются плейсхолдеры вида <code>{{project.name}}</code>, <code>{{customer.inn}}</code>, <code>{{calc.cable.section}}</code>. При рендере подставляются из контекста текущего проекта.</p>
        <h4>JSON-схема шаблона</h4>
        <p><code>{ id, name, description, tags, blocks: [...], meta: { author, createdAt, updatedAt } }</code></p>
        <div class="warn">При миграции старых шаблонов новые типы блоков могут быть неизвестны — они помечаются как <code>unknown</code> и пропускаются при рендере.</div>
      `,
    });
    if (window.Auth && typeof window.Auth.init === 'function') {
      window.Auth.init().catch(e => console.warn('[reports] auth init failed', e));
    }
  </script>

  <main>
    <!-- ======== Левая колонка: каталог ======== -->
    <aside class="rpt-cat-sidebar">
      <div class="rpt-cat-sidebar__hdr">
        <h2>Мои шаблоны</h2>
        <input type="search" id="cat-search" class="rpt-cat-sidebar__search"
               placeholder="🔍 Поиск по имени / описанию / тегу…">
      </div>
      <div class="rpt-cat-sidebar__toolbar">
        <button class="btn primary btn-sm" id="btn-new">+ Новый</button>
        <button class="btn btn-sm" id="btn-import">Импорт…</button>
        <button class="btn btn-sm" id="btn-export">Экспорт всех</button>
        <button class="btn-help" id="btn-help" title="Справка по использованию">?</button>
        <input type="file" id="file-import" accept=".json" style="display:none">
      </div>
      <div class="rpt-cat-sidebar__list" id="cat-list"></div>
    </aside>

    <!-- ======== Правая колонка: детали ======== -->
    <section class="rpt-detail" id="detail">
      <div class="rpt-detail__empty" id="detail-empty">
        Выберите шаблон слева или создайте новый.
      </div>
      <div class="rpt-detail__full" id="detail-full" style="display:none;flex:1;flex-direction:column;min-height:0">
        <div class="rpt-detail__hdr">
          <div class="rpt-detail__title-block">
            <h1 class="rpt-detail__title" id="detail-title"></h1>
            <div class="rpt-detail__subtitle" id="detail-subtitle"></div>
          </div>
          <div class="rpt-detail__actions">
            <button class="btn primary btn-sm" id="btn-edit">Редактировать оформление</button>
            <button class="btn btn-sm" id="btn-rename">Переименовать</button>
            <button class="btn btn-sm" id="btn-clone">Клонировать</button>
            <button class="btn btn-sm" id="btn-export-one">Экспорт JSON</button>
            <button class="btn btn-sm" id="btn-pdf">PDF</button>
            <button class="btn btn-sm" id="btn-docx">DOCX</button>
            <button class="btn danger btn-sm" id="btn-delete">Удалить</button>
          </div>
        </div>
        <div class="rpt-detail__body" id="detail-preview"></div>
      </div>
    </section>
  </main>

  <script type="module" src="./reports.js"></script>
  <script type="module">
    import { mountFooter as mountModuleFooter } from '../shared/module-footer.js';
    import { APP_VERSION } from '../js/engine/constants.js';
    import { CHANGELOGS } from '../shared/module-changelogs.js';
    mountModuleFooter({ appVersion: APP_VERSION, moduleId: 'reports', moduleTitle: 'Отчёты', entries: CHANGELOGS['reports'] || [] });
  </script>
</body>
</html>
