<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Raschet · Конфигуратор ИБП</title>
  <link rel="stylesheet" href="../shared/styles/base.css">
  <link rel="stylesheet" href="../shared/app-header.css">
  <link rel="stylesheet" href="ups-config.css">
  <script src="../firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="../shared/auth.js"></script>
</head>
<body>
  <div id="rs-header-mount"></div>
  <script type="module">
    import { mountHeader } from '../shared/app-header.js';
    mountHeader({ title: 'Конфигуратор ИБП', home: '../hub.html' });
    if (window.Auth && typeof window.Auth.init === 'function') {
      window.Auth.init().catch(e => console.warn('[ups-config] auth init failed', e));
    }
  </script>

  <main>
    <div class="page-intro">
      <h2>Конфигуратор ИБП</h2>
      <p class="muted">
        Справочник моделей ИБП и подбор по параметрам. Данные хранятся
        per-user в localStorage и доступны в инспекторе ИБП на главной
        схеме через общий <code>shared/ups-picker.js</code>.
      </p>
    </div>

    <section class="panel">
      <div class="panel-head">
        <h3>Справочник моделей ИБП</h3>
        <div style="display:flex;gap:8px">
          <button id="btn-add-manual" class="btn-sm">+ Добавить вручную</button>
          <button id="btn-seed-kehua" class="btn-sm" title="Загрузить Kehua MR33 200/300/400/500 из брошюры производителя">⚡ Kehua MR33</button>
          <button id="btn-clear-catalog" class="btn-sm btn-danger">Очистить</button>
        </div>
      </div>

      <div id="ups-cascade-mount" style="margin-bottom:10px"></div>

      <div id="catalog-list"></div>
    </section>

    <section class="panel" style="margin-top:20px">
      <div class="panel-head">
        <h3>Выбранная модель</h3>
      </div>
      <div id="selected-ups-details" class="empty">Выберите модель в каскаде выше.</div>
    </section>
  </main>

  <div id="flash" class="flash"></div>

  <script type="module" src="ups-config.js"></script>
</body>
</html>
