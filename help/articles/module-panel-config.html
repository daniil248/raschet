<h2>Назначение</h2>
<p><b>Конфигуратор НКУ (LV щит)</b> — низковольтное комплектное устройство до 1 кВ по IEC 61439 (TTA/PTTA): ВРУ, АВР, ЩС, ЩО, ЩК.</p>

<h2>Что внутри</h2>
<ul>
  <li>Подбор оболочки (размер, IP)</li>
  <li>Вводные / отходящие автоматы</li>
  <li>Секционирование</li>
  <li>Формы разделения 1-4 (FormA-FormD)</li>
</ul>
