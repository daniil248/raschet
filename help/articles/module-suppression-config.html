<h2>Назначение</h2>
<p><b>Конфигуратор АГПТ</b> — система автоматического газового пожаротушения для серверных помещений.</p>

<h2>Что считается</h2>
<ul>
  <li>Объём защищаемого помещения</li>
  <li>Тип газа (FK-5-1-12, INERGEN, CO₂, ...)</li>
  <li>Концентрация согласно нормам (NFPA, СП)</li>
  <li>Количество и ёмкость баллонов</li>
</ul>
