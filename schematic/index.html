<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Схема принципиальная — Raschet</title>
  <link rel="stylesheet" href="../shared/app-header.css">
  <link rel="stylesheet" href="schematic.css">
</head>
<body>
  <div id="rs-header-mount"></div>
  <script type="module">
    import { mountHeader } from '../shared/app-header.js';
    import { mountHelp } from '../shared/help-panel.js';
    mountHeader({ title: 'Схема принципиальная', home: '../hub.html' });
    mountHelp({
      module: 'schematic',
      title: 'Схема электрическая принципиальная (Э3)',
      usage: `
        <h4>Назначение модуля</h4>
        <p>Редактор принципиальных схем по IEC 60617, SVG-based. Размещение символов на листах ISO 216 (A4–A0), проводка связей, печать и экспорт.</p>
        <div class="warn">⚠ Модуль находится в разработке (WIP). Часть функций (авто-маршрутизация, нетлисты, проверки DRC) пока отсутствует.</div>
        <h4>Порядок работы</h4>
        <ol>
          <li><b>Формат листа</b> — выберите A4/A3/A2/A1/A0 + ориентацию (альбомная / книжная).</li>
          <li><b>Основная надпись</b> — заполните поля ISO 7200 (наименование, разработчик, дата, ревизия).</li>
          <li><b>Символы</b> — перетащите из левой палитры (палитра по IEC 60617, с поиском) на лист.</li>
          <li><b>Провода</b> — инструмент Wire (W), соединения — Junction (J).</li>
          <li><b>Поворот / отражение</b> — R / M. Удаление — Del.</li>
          <li><b>Листы</b> — кнопка «+» снизу добавляет новый лист; каждый лист — свой формат.</li>
          <li><b>Зум</b> — Ctrl+колесо. Панорама — средняя кнопка мыши.</li>
          <li><b>Сохранение</b> — JSON (Сохранить / Открыть), экспорт SVG, печать / PDF.</li>
        </ol>
        <h4>Горячие клавиши</h4>
        <table>
          <tr><th>Клавиша</th><th>Действие</th></tr>
          <tr><td><code>S</code></td><td>Выбор</td></tr>
          <tr><td><code>W</code></td><td>Провод</td></tr>
          <tr><td><code>J</code></td><td>Соединение</td></tr>
          <tr><td><code>T</code></td><td>Текст</td></tr>
          <tr><td><code>R</code></td><td>Поворот 90°</td></tr>
          <tr><td><code>M</code></td><td>Отражение</td></tr>
          <tr><td><code>Del</code></td><td>Удалить</td></tr>
          <tr><td><code>Ctrl+Z / Ctrl+Y</code></td><td>Undo / Redo</td></tr>
        </table>
      `,
      calcs: `
        <h4>Библиотека символов IEC 60617</h4>
        <ul>
          <li><b>Коммутационные</b> — автоматы (MCB / MCCB / ACB), выключатели нагрузки, разъединители, контакторы.</li>
          <li><b>Защитные</b> — УЗО, дифавтоматы, плавкие вставки, разрядники.</li>
          <li><b>Машины</b> — двигатели M (АД / СД), генераторы G.</li>
          <li><b>Источники</b> — аккумуляторы, ИБП, трансформаторы.</li>
          <li><b>Измерительные</b> — амперметры, вольтметры, счётчики.</li>
          <li><b>Коммуникация</b> — клеммы, разъёмы, кабельные терминалы.</li>
        </ul>
        <h4>Canvas-модель</h4>
        <ul>
          <li><b>Сетка</b> — шаг 5 мм по умолчанию, привязка (snap) к узлам.</li>
          <li><b>Слои</b> — <code>sch-wires</code> (провода), <code>sch-components</code> (символы), <code>sch-texts</code> (подписи), <code>sch-overlay</code> (вспомогательные линии).</li>
          <li><b>Координаты</b> — в мм от начала листа; внутри SVG — единицы viewBox.</li>
        </ul>
        <h4>Экспорт</h4>
        <ul>
          <li><b>SVG</b> — векторный, с inline-символами, готов для вставки в документацию.</li>
          <li><b>PDF</b> — через браузерный print с CSS @page, размеры листа соответствуют выбранному формату.</li>
          <li><b>JSON</b> — внутренний формат редактора (символы + связи + надпись), для последующего открытия.</li>
        </ul>
        <h4>Основная надпись (ISO 7200)</h4>
        <p>Штамп в правом-нижнем углу содержит: наименование изделия, тип документа (Э3 — схема электрическая принципиальная), обозначение документа, разработчик, утвердил, владелец, дата, ревизия, язык.</p>
        <div class="note">Формат обозначения документа — <code>XXX.YYYYYY.ZZZ Э3</code> по ГОСТ 2.201.</div>
      `,
    });
  </script>

  <main class="sch-app">
    <!-- ======================== Левая панель — палитра ======================== -->
    <aside class="sch-palette">
      <div class="sch-palette-head">
        <div class="sch-palette-title">IEC 60617</div>
        <input type="text" id="sch-palette-search" placeholder="Поиск символа…">
      </div>
      <div class="sch-palette-body" id="sch-palette-body">
        <!-- сюда рендерится библиотека символов -->
      </div>
    </aside>

    <!-- ======================== Центральная область ======================== -->
    <section class="sch-center">
      <!-- верхний тулбар -->
      <div class="sch-toolbar">
        <div class="sch-tool-group" role="radiogroup" aria-label="Инструмент">
          <button class="sch-tool active" data-tool="select" title="Выбор (S)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3l6 17 2.5-7 7-2.5z"/></svg>
          </button>
          <button class="sch-tool" data-tool="wire" title="Провод (W)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18h8l4-12h6"/></svg>
          </button>
          <button class="sch-tool" data-tool="junction" title="Соединение (J)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16M12 4v16"/><circle cx="12" cy="12" r="2.2" fill="currentColor"/></svg>
          </button>
          <button class="sch-tool" data-tool="text" title="Текст (T)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5h14M12 5v14"/></svg>
          </button>
        </div>

        <div class="sch-tool-sep"></div>

        <div class="sch-tool-group">
          <button class="sch-tool" id="sch-btn-rotate" title="Поворот 90° (R)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>
          </button>
          <button class="sch-tool" id="sch-btn-mirror" title="Отражение (M)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M7 7l-3 5 3 5M17 7l3 5-3 5"/></svg>
          </button>
          <button class="sch-tool" id="sch-btn-delete" title="Удалить (Del)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>
          </button>
          <button class="sch-tool" id="sch-btn-undo" title="Отменить (Ctrl+Z)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a6 6 0 0 1 0 12H9"/></svg>
          </button>
          <button class="sch-tool" id="sch-btn-redo" title="Повторить (Ctrl+Y)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14l5-5-5-5"/><path d="M20 9H9a6 6 0 0 0 0 12h6"/></svg>
          </button>
        </div>

        <div class="sch-tool-sep"></div>

        <div class="sch-tool-group">
          <label class="sch-tool-label">Формат</label>
          <select id="sch-paper-size">
            <option value="A4">A4 297×210</option>
            <option value="A3" selected>A3 420×297</option>
            <option value="A2">A2 594×420</option>
            <option value="A1">A1 841×594</option>
            <option value="A0">A0 1189×841</option>
          </select>
          <select id="sch-paper-orient">
            <option value="landscape" selected>Альбомная</option>
            <option value="portrait">Книжная</option>
          </select>
        </div>

        <div class="sch-tool-sep"></div>

        <div class="sch-tool-group">
          <button class="sch-tool" id="sch-btn-zoom-out" title="Уменьшить"><span>−</span></button>
          <button class="sch-tool" id="sch-btn-zoom-fit" title="По размеру"><span>⤢</span></button>
          <button class="sch-tool" id="sch-btn-zoom-in" title="Увеличить"><span>+</span></button>
          <span class="sch-zoom-value" id="sch-zoom-value">100%</span>
        </div>

        <div class="sch-tool-spacer"></div>

        <div class="sch-tool-group">
          <button class="sch-tool primary" id="sch-btn-save" title="Сохранить JSON">Сохранить</button>
          <button class="sch-tool" id="sch-btn-load" title="Загрузить JSON">Открыть</button>
          <button class="sch-tool" id="sch-btn-export-svg" title="Экспорт SVG">SVG</button>
          <button class="sch-tool" id="sch-btn-print" title="Печать / PDF">Печать</button>
        </div>
      </div>

      <!-- область листа -->
      <div class="sch-canvas-wrap" id="sch-canvas-wrap">
        <svg id="sch-canvas" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
          <defs id="sch-defs"></defs>
          <!-- рамка листа -->
          <g id="sch-sheet">
            <rect id="sch-sheet-bg" class="sch-sheet-bg"/>
            <rect id="sch-sheet-frame" class="sch-sheet-frame"/>
            <g id="sch-sheet-zones"></g>
            <g id="sch-title-block"></g>
          </g>
          <!-- сетка -->
          <g id="sch-grid-layer"></g>
          <!-- содержимое (символы, провода) -->
          <g id="sch-content">
            <g id="sch-wires"></g>
            <g id="sch-components"></g>
            <g id="sch-texts"></g>
          </g>
          <!-- вспомогательные линии -->
          <g id="sch-overlay"></g>
        </svg>

        <!-- строка состояния -->
        <div class="sch-statusbar" id="sch-statusbar">
          <span id="sch-sb-tool">Инструмент: Выбор</span>
          <span class="sch-sb-sep">·</span>
          <span id="sch-sb-xy">X: 0.0  Y: 0.0 мм</span>
          <span class="sch-sb-sep">·</span>
          <span id="sch-sb-hint">Ctrl+колесо — зум, средняя кнопка — панорама</span>
        </div>

        <!-- список листов -->
        <div class="sch-sheets-bar" id="sch-sheets-bar">
          <button class="sch-sheet-tab active" data-sheet="1">Лист 1</button>
          <button class="sch-sheet-add" id="sch-sheet-add" title="Добавить лист">+</button>
        </div>
      </div>
    </section>

    <!-- ======================== Правая панель — свойства ======================== -->
    <aside class="sch-props">
      <div class="sch-props-head">Свойства</div>
      <div class="sch-props-body" id="sch-props-body">
        <div class="sch-props-empty">Ничего не выбрано</div>
      </div>

      <div class="sch-props-head">Основная надпись (ISO 7200)</div>
      <div class="sch-props-body">
        <label class="sch-field">
          <span>Наименование изделия</span>
          <input type="text" id="sch-tb-title" placeholder="Щит распределительный">
        </label>
        <label class="sch-field">
          <span>Наименование документа</span>
          <input type="text" id="sch-tb-doctype" value="Схема электрическая принципиальная">
        </label>
        <label class="sch-field">
          <span>Обозначение документа</span>
          <input type="text" id="sch-tb-docno" placeholder="XXX.YYYYYY.ZZZ Э3">
        </label>
        <label class="sch-field">
          <span>Разработчик (Prepared by)</span>
          <input type="text" id="sch-tb-prep">
        </label>
        <label class="sch-field">
          <span>Утвердил (Approved by)</span>
          <input type="text" id="sch-tb-appr">
        </label>
        <div class="sch-field-row">
          <label class="sch-field">
            <span>Владелец</span>
            <input type="text" id="sch-tb-owner">
          </label>
          <label class="sch-field">
            <span>Дата</span>
            <input type="date" id="sch-tb-date">
          </label>
        </div>
        <div class="sch-field-row">
          <label class="sch-field">
            <span>Ревизия</span>
            <input type="text" id="sch-tb-rev" value="A">
          </label>
          <label class="sch-field">
            <span>Язык</span>
            <input type="text" id="sch-tb-lang" value="ru">
          </label>
        </div>
      </div>
    </aside>
  </main>

  <input type="file" id="sch-file-input" accept=".json,application/json" style="display:none">

  <script type="module" src="schematic.js"></script>
</body>
</html>
