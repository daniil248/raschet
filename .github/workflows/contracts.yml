# Raschet — проверка контрактов границ (Фаза 0).
# Запускает boundary-lint и валидирует allowlist. НЕ публикует и НЕ
# гейтит GitHub Pages (Pages = classic «Deploy from branch», эти
# Actions независимы). Фаза 0: НЕ блокирующий (continue-on-error) —
# проверка информационная; станет блокирующим в Фазе 1 (убрать
# continue-on-error у шага boundary-lint).
name: contracts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  boundary-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate lint-allowlist.json
        run: node -e "JSON.parse(require('fs').readFileSync('shared/contracts/lint-allowlist.json','utf8')); console.log('allowlist JSON OK')"
      - name: boundary-lint (Фаза 0 — advisory, не блокирует)
        continue-on-error: true
        run: node tools/boundary-lint.mjs
