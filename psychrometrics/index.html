<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Raschet · ID-диаграмма Молье-Рамзина</title>
  <link rel="stylesheet" href="../shared/styles/base.css">
  <link rel="stylesheet" href="../shared/app-header.css">
  <link rel="stylesheet" href="psychrometrics.css">
</head>
<body>
  <div id="rs-header-mount"></div>
  <script type="module">
    import { mountHeader } from '../shared/app-header.js';
    mountHeader({ title: 'ID-диаграмма Молье-Рамзина (ASHRAE 2021)', home: '../hub.html' });
  </script>

  <div class="psy-wrap">
    <!-- Атмосфера / условия объекта -->
    <div class="psy-panel">
      <div class="psy-panel-title">Условия объекта</div>
      <div class="psy-top-row">
        <label class="psy-field psy-inline" title="Высота над уровнем моря. Давление пересчитывается по ISA/ГОСТ 4401-81.">
          <span>Высота над у. м., м</span>
          <input type="number" id="psy-alt" value="0" step="10" min="0" max="5000">
        </label>
        <label class="psy-field psy-inline">
          <span>Атм. давление, кПа</span>
          <input type="number" id="psy-P-kpa" value="101.325" step="0.001">
        </label>
        <label class="psy-field psy-inline" title="Ограничение φ в цикле (уведомление если точка превышает).">
          <span>Макс. φ, %</span>
          <input type="number" id="psy-rhmax" value="100" step="1" min="20" max="100">
        </label>
        <label class="psy-field psy-inline" title="Температура поверхности холодного теплообменника (воды/хладоносителя). Влияет на процесс C (охлаждение с осушением) при автоподборе точки после испарителя.">
          <span>t поверхности, °C</span>
          <input type="number" id="psy-tevap" value="15" step="0.5">
        </label>
        <label class="psy-field psy-inline" title="Базовый расход воздуха по циклу. Используется, если у конкретного процесса не задан свой V.">
          <span>Базовый расход V, м³/ч</span>
          <input type="number" id="psy-vbase" value="10000" step="100" min="0">
        </label>
      </div>
    </div>

    <!-- Цикл: карточки точек -->
    <div class="psy-panel">
      <div class="psy-panel-title">
        Цикл (точки и процессы)
        <button type="button" id="psy-add" class="psy-btn psy-btn-primary">+ точка</button>
        <button type="button" id="psy-demo" class="psy-btn">Демо-цикл «лето/зима»</button>
        <button type="button" id="psy-clear" class="psy-btn">Очистить</button>
      </div>
      <div class="psy-cycle" id="psy-cycle"></div>
    </div>

    <!-- Диаграмма -->
    <div class="psy-panel">
      <div class="psy-panel-title">Диаграмма Молье-Рамзина</div>
      <div class="psy-chart" id="psy-chart"></div>
    </div>

    <!-- Результаты по точкам -->
    <div class="psy-panel">
      <div class="psy-panel-title">Параметры воздуха по точкам</div>
      <div class="psy-tbl-wrap">
        <table class="psy-tbl psy-output" id="psy-output">
          <thead>
            <tr><th>Точка</th><th>Имя</th>
              <th>t, °C</th><th>φ, %</th><th>d, г/кг</th><th>h, кДж/кг</th>
              <th>ρ, кг/м³</th><th>v, м³/кг</th>
              <th>t<sub>р</sub>, °C</th><th>t<sub>м</sub>, °C</th>
            </tr>
          </thead>
          <tbody id="psy-output-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Сводка процессов -->
    <div class="psy-panel">
      <div class="psy-panel-title">Процессы (тепловая мощность и влагоприток)</div>
      <div class="psy-tbl-wrap">
        <table class="psy-tbl psy-output" id="psy-proc-out">
          <thead>
            <tr><th>№</th><th>Процесс</th>
              <th>V, м³/ч</th><th>ΔT, °C</th><th>Δd, г/кг</th><th>Δh, кДж/кг</th>
              <th>G<sub>в</sub>, кг/ч</th><th>Q, кВт</th>
              <th>q<sub>w</sub>, кг/ч</th><th>знак</th>
            </tr>
          </thead>
          <tbody id="psy-proc-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Формулы -->
    <div class="psy-panel">
      <div class="psy-panel-title">Формулы и пояснения</div>
      <div class="psy-formulas" id="psy-formulas"></div>
    </div>
  </div>

  <script type="module" src="psychrometrics.js"></script>
  <script type="module">
    import { mountFooter as mountModuleFooter } from '../shared/module-footer.js';
    import { APP_VERSION } from '../js/engine/constants.js';
    import { CHANGELOGS } from '../shared/module-changelogs.js';
    mountModuleFooter({ appVersion: APP_VERSION, moduleId: 'psychrometrics', moduleTitle: 'i-d диаграмма', entries: CHANGELOGS['psychrometrics'] || [] });
  </script>
</body>
</html>
